<!DOCTYPE html>
<!--
  Tailwind Play CDN (@tailwindcss/browser@4) is used for development and demo simplicity.
  A production deployment would build Tailwind as a static asset via the Tailwind CLI
  or a PostCSS pipeline (e.g. `tailwindcss -i input.css -o dist/app.css --minify`).
-->
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Cloud Cost Optimizer{% endblock %}</title>

  <!-- Tailwind CSS v4 Play CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- HTMX -->
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* System font stack as the default sans-serif family */
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;

      /* Accent colour — sky blue for enterprise emphasis */
      --color-accent-50:  oklch(97.0% 0.013 236);
      --color-accent-100: oklch(93.1% 0.032 255);
      --color-accent-500: oklch(68.8% 0.169 237);
      --color-accent-600: oklch(60.5% 0.189 237);
      --color-accent-700: oklch(53.4% 0.185 244);
    }

    @layer base {
      body {
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
      }
    }
  </style>

  {% block head %}{% endblock %}
</head>
<body class="h-full bg-slate-50 text-slate-900">

  <!-- Navigation -->
  <header class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
    <div class="mx-auto max-w-7xl px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <svg class="w-5 h-5 text-sky-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 15a4 4 0 004 4h9a5 5 0 10-4.584-7H7a4 4 0 00-4 4z"/>
        </svg>
        <a href="/" class="text-base font-semibold tracking-tight text-white hover:text-sky-300 transition-colors">
          Cloud Cost Optimizer
        </a>
        <span class="hidden sm:inline text-slate-600 text-sm">|</span>
        <span class="hidden sm:inline text-slate-400 text-sm">FinOps</span>
      </div>
      <nav class="flex items-center gap-5 text-sm">
        <a href="/" class="text-slate-300 hover:text-white transition-colors">Dashboard</a>
        <a href="/upload"
           class="inline-flex items-center gap-1.5 rounded-md bg-sky-600 px-3 py-1.5 text-white text-sm font-medium hover:bg-sky-500 transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
          </svg>
          Upload Export
        </a>
      </nav>
    </div>
  </header>

  <!-- Main content -->
  <main class="mx-auto max-w-7xl px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-200 mt-16 bg-white">
    <div class="mx-auto max-w-7xl px-6 py-4 flex items-center justify-between text-xs text-slate-400">
      <span>Cloud Cost Optimizer &mdash; FinOps Edition</span>
      <span>AWS &amp; Azure Billing Analysis</span>
    </div>
  </footer>

</body>
</html>
